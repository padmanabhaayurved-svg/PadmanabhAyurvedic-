<div class="page-view animate-fade-in" id="earn-page">
  <section class="section" style="padding-top: calc(var(--nav-h) + 40px); background: var(--surface);">
    <div class="container text-center">

      <p style="color: var(--text-secondary); max-width: 600px; margin: 0 auto 32px;">
        Join Padmanabh Ayurvedics for our B2B sales and distribution program. Work from home and help us spread pure wellness.
      </p>
      
      <div style="background: var(--bg-body); border: 2px solid var(--gold); border-radius: var(--radius-lg); padding: 32px; max-width: 700px; margin: 0 auto 48px; box-shadow: var(--shadow-md);">
        <h2 style="color: var(--gold); font-size: 2rem; margin-bottom: 16px;">
          Earn Up To <span style="background: var(--gold); color: white; padding: 4px 12px; border-radius: 8px;">50% Extra Commission</span>
