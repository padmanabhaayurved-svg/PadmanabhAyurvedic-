<!-- USER DASHBOARD PAGE -->
<div class="dashboard-page">
  <div class="container" id="dashboard-container">
    <!-- Rendered via JS -->
  </div>
</div>

<script>
document.addEventListener('page:dashboard', renderDashboard);

async function renderDashboard() {
  const container = document.getElementById('dashboard-container');
  if (!container) return;

  // Handle Auth0 Callback
  await Auth0Helper.handleCallback();

  let user = getCurrentUser();
  if (!user) {
    user = await Auth0Helper.getUser();
    if (user) {
      // Map Auth0 user to a compatible object
      user = { 
        uid: user.sub, 
        email: user.email, 
        displayName: user.name,
        isAuth0: true 
      };
    }
  }

  if (!user) {
    // Show Auth Forms
    container.innerHTML = `
      <div class="auth-card">
        <img src="assets/logo.png" alt="Padmanabh Ayurvedics Logo" style="height: 60px; width: auto; max-width: 100%; object-fit: contain; margin: 0 auto 16px auto; display: block;" />
        <h2 class="admin-login-title" style="margin-bottom:8px" id="auth-title" data-i18n="dashboard.login.title">Welcome Back</h2>
        <p class="auth-subtitle">Sign in to track your orders and manage your account.</p>

        <form id="auth-form" class="form-group" style="gap:20px">
          <div class="form-group" id="name-group" style="display:none">
            <label class="form-label" data-i18n="dashboard.register.name">Full Name</label>
            <input type="text" class="form-input" id="auth-name"/>
          </div>
          <div class="form-group">
            <label class="form-label" data-i18n="dashboard.login.email">Email Address</label>
            <input type="email" class="form-input" id="auth-email" required/>
          </div>
          <div class="form-group">
            <label class="form-label" data-i18n="dashboard.login.password">Password</label>
            <input type="password" class="form-input" id="auth-pass" required/>
          </div>
          <button type="submit" class="btn btn-primary btn-full mt-8" id="auth-submit" data-i18n="dashboard.login.submit">Sign In</button>
        </form>

        <div class="text-center mt-24">
          <button class="btn btn-ghost btn-sm" id="auth-toggle" onclick="toggleAuthMode()" data-i18n="dashboard.login.register">New here? Create account</button>
        </div>

        <div style="margin-top: 24px; padding-top: 24px; border-top: 1px solid var(--border); text-center: center;">
          <p style="font-size: 0.8rem; color: var(--text-muted); margin-bottom: 16px;">Or use secure social login:</p>
          <button type="button" class="btn btn-outline btn-full" onclick="Auth0Helper.login('#dashboard')" style="display: flex; align-items: center; justify-content: center; gap: 10px;">
            <img src="https://auth0.com/favicon.ico" style="width: 16px; height: 16px;" alt="Auth0" />
            Login with Auth0
          </button>
        </div>
      </div>
    `;
    applyStrings();

    document.getElementById('auth-form').addEventListener('submit', async e => {
      e.preventDefault();
      const isReg = document.getElementById('name-group').style.display !== 'none';
      const email = document.getElementById('auth-email').value;
      const pass  = document.getElementById('auth-pass').value;
      const btn   = document.getElementById('auth-submit');

      btn.disabled = true;
      btn.textContent = 'Please wait...';

      try {
        if (isReg) {
          const res = await signUp(email, pass);
          const name = document.getElementById('auth-name').value;
          if (name) await res.user.updateProfile({ displayName: name });
        } else {
          await signIn(email, pass);
        }
        showToast('Successfully signed in', 'success');
        renderDashboard(); // Re-render as logged in
      } catch (err) {
        btn.disabled = false;
        btn.textContent = isReg ? 'Create Account' : 'Sign In';
        showToast(err.message, 'error');
      }
    });
    return;
  }

  // Logged In State
  container.innerHTML = `
    <div class="dashboard-header">
      <div>
        <h1 data-i18n="dashboard.title">My Orders</h1>
        <p style="color:var(--text-muted);font-size:0.9rem;margin-top:4px">${user.email}</p>
      </div>
      <button class="btn btn-outline btn-sm" onclick="handleSignOut()" data-i18n="dashboard.logout">Sign Out</button>
    </div>

    <div class="data-table-wrap" style="margin-top:40px">
      <table class="orders-table" id="orders-table">
        <thead>
          <tr>
            <th data-i18n="dashboard.order.id">Order ID</th>
            <th data-i18n="dashboard.order.date">Date</th>
            <th data-i18n="dashboard.order.total">Total</th>
            <th data-i18n="dashboard.order.status">Status</th>
            <th>Actions</th>
          </tr>
        </thead>
        <tbody id="orders-body">
          <tr><td colspan="5" class="text-center" style="padding:40px" data-i18n="common.loading">Loading orders...</td></tr>
        </tbody>
      </table>
    </div>
  `;
  applyStrings();

  // Fetch orders from localStorage (chatbot + future Firebase)
  let orders = [];
  try { orders = JSON.parse(localStorage.getItem('pa_orders') || '[]'); } catch(e) {}
  // Also try Firebase if available
  try {
    const firebaseOrders = await getUserOrders(user.uid);
    if (firebaseOrders.length > 0) orders = [...firebaseOrders, ...orders];
  } catch(e) {}

  window._currentUserOrders = orders; // Save for modal

  const tbody = document.getElementById('orders-body');

  if (orders.length === 0) {
    tbody.innerHTML = `
      <tr>
        <td colspan="5" class="text-center" style="padding:60px 20px">
          <p style="color:var(--text-muted);margin-bottom:16px" data-i18n="dashboard.no_orders">No orders yet.</p>
          <button class="btn btn-outline" onclick="navigate('catalog')" data-i18n="dashboard.no_orders.cta">Shop Now</button>
        </td>
      </tr>
    `;
    applyStrings();
    return;
  }

  tbody.innerHTML = orders.map(o => {
    const d = o.createdAt ? new Date(o.createdAt).toLocaleDateString() : 'Just now';
    let statusClass = 'pill-muted';
    if (o.status === 'processing') statusClass = 'pill-warning';
    if (o.status === 'shipped')    statusClass = 'pill-gold';
    if (o.status === 'delivered')  statusClass = 'pill-success';

    const itemSummary = (o.items || []).map(i => `${i.name} ×${i.qty}`).join(', ');

    return `
      <tr>
        <td style="font-family:var(--font-sans);font-weight:500">#${o.id.slice(-6).toUpperCase()}</td>
        <td>
          <div style="font-size:0.82rem">${d}</div>
          ${itemSummary ? `<div style="font-size:0.75rem;color:var(--text-muted);margin-top:2px">${itemSummary.substring(0,30)}${itemSummary.length>30?'...':''}</div>` : ''}
        </td>
        <td>₹${o.total || 0}</td>
        <td><span class="pill ${statusClass}" data-i18n="status.${o.status}">${(o.status || 'PENDING').toUpperCase()}</span></td>
        <td style="display:flex;gap:8px">
          <button class="btn btn-outline btn-sm" style="padding:4px 8px;font-size:0.75rem" onclick="viewOrderDetails('${o.id}')">Details</button>
          ${o.trackingId
            ? `<button class="btn btn-ghost btn-sm" style="padding:4px 8px;font-size:0.75rem" onclick="trackOrder('${o.trackingId}')">Track</button>`
            : ''
          }
        </td>
      </tr>
    `;
  }).join('');
  applyStrings();
}

let _isRegMode = false;
function toggleAuthMode() {
  _isRegMode = !_isRegMode;
  document.getElementById('name-group').style.display = _isRegMode ? 'block' : 'none';
  const nameInput = document.getElementById('auth-name');
  if (_isRegMode) nameInput.setAttribute('required', 'true'); else nameInput.removeAttribute('required');

  document.getElementById('auth-title').setAttribute('data-i18n', _isRegMode ? 'dashboard.register.title' : 'dashboard.login.title');
  document.getElementById('auth-submit').setAttribute('data-i18n', _isRegMode ? 'dashboard.register.submit' : 'dashboard.login.submit');
  document.getElementById('auth-toggle').setAttribute('data-i18n', _isRegMode ? 'dashboard.register.login' : 'dashboard.login.register');
  applyStrings();
}
window.toggleAuthMode = toggleAuthMode;

async function handleSignOut() {
  const user = await Auth0Helper.getUser();
  if (user) {
    await Auth0Helper.logout('#dashboard');
  } else {
    await signOut();
    navigate('home');
    showToast('Signed out successfully');
  }
}
window.handleSignOut = handleSignOut;

async function trackOrder(awb) {
  showToast('Fetching tracking details...', 'info');
  const res = await ShiprocketHelper.trackShipment(awb);
  const data = res.tracking_data;

  const activities = data?.shipment_track_activities || [];
  const listHtml = activities.map(a => `
    <div style="margin-bottom:12px;padding-bottom:12px;border-bottom:1px solid var(--border)">
      <div style="font-size:0.75rem;color:var(--text-muted)">${a.date}</div>
      <div style="font-weight:500;margin:4px 0">${a.activity}</div>
      <div style="font-size:0.8rem;color:var(--text-secondary)">${a.location}</div>
    </div>
  `).join('');

  // Show in a modal
  const modal = document.createElement('div');
  modal.className = 'modal-overlay';
  modal.innerHTML = `
    <div class="modal">
      <div class="modal-header">
        <h3 class="modal-title">Tracking: ${awb}</h3>
        <button class="modal-close" onclick="this.closest('.modal-overlay').remove()">×</button>
      </div>
      <div class="modal-body">
        ${listHtml || '<p>No tracking updates available yet.</p>'}
      </div>
    </div>
  `;
  document.body.appendChild(modal);
}
window.trackOrder = trackOrder;

function viewOrderDetails(orderId) {
  const o = window._currentUserOrders.find(x => x.id === orderId);
  if (!o) return;

  const d = o.createdAt ? new Date(o.createdAt).toLocaleDateString() : 'Just now';
  const itemsHtml = (o.items || []).map(i => `
    <div style="display:flex; justify-content:space-between; margin-bottom:8px; border-bottom:1px solid var(--border); padding-bottom:8px;">
      <div>
        <div style="font-weight:500">${i.name}</div>
        <div style="font-size:0.8rem; color:var(--text-muted)">Qty: ${i.qty}</div>
      </div>
      <div style="font-weight:500">₹${i.price * i.qty}</div>
    </div>
  `).join('');

  const modal = document.createElement('div');
  modal.className = 'modal-overlay';
  modal.innerHTML = `
    <div class="modal" id="print-area">
      <div class="modal-header">
        <h3 class="modal-title">Order #${o.id.slice(-6).toUpperCase()}</h3>
        <button class="modal-close" onclick="this.closest('.modal-overlay').remove()">×</button>
      </div>
      <div class="modal-body" style="font-family:var(--font-sans); font-size:0.9rem;">
        
        <div style="margin-bottom:20px; display:flex; justify-content:space-between; flex-wrap:wrap; gap:20px;">
          <div>
            <div style="font-size:0.7rem; color:var(--text-muted); text-transform:uppercase; letter-spacing:1px; margin-bottom:4px;">Date</div>
            <div style="font-weight:500">${d}</div>
          </div>
          <div>
            <div style="font-size:0.7rem; color:var(--text-muted); text-transform:uppercase; letter-spacing:1px; margin-bottom:4px;">Status</div>
            <span class="pill pill-gold">${(o.status || 'PENDING').toUpperCase()}</span>
          </div>
        </div>

        <div style="margin-bottom:24px;">
          <div style="font-size:0.7rem; color:var(--text-muted); text-transform:uppercase; letter-spacing:1px; margin-bottom:8px;">Shipping Address</div>
          <div style="background:var(--bg-surface); padding:12px; border-radius:var(--radius-sm); border:1px solid var(--border);">
            ${o.address ? `
              <div style="font-weight:500">${o.address.name || o.customerName}</div>
              <div>${o.address.phone || o.customerPhone}</div>
              <div style="margin-top:4px; color:var(--text-secondary)">${o.address.address}, ${o.address.city}, ${o.address.state} - ${o.address.pincode}</div>
            ` : 'No address provided'}
          </div>
        </div>

        <div style="margin-bottom:24px;">
          <div style="font-size:0.7rem; color:var(--text-muted); text-transform:uppercase; letter-spacing:1px; margin-bottom:8px;">Items Ordered</div>
          <div style="background:var(--bg-surface); padding:12px; border-radius:var(--radius-sm); border:1px solid var(--border);">
            ${itemsHtml}
            <div style="display:flex; justify-content:space-between; margin-top:12px; font-size:0.85rem;">
              <span style="color:var(--text-muted)">Subtotal</span>
              <span>₹${o.subtotal || o.total}</span>
            </div>
            <div style="display:flex; justify-content:space-between; margin-top:4px; font-size:0.85rem;">
              <span style="color:var(--text-muted)">Shipping</span>
              <span>₹${o.shipping || 0}</span>
            </div>
            <div style="display:flex; justify-content:space-between; margin-top:8px; font-weight:600; font-size:1.1rem; border-top:1px solid var(--border); padding-top:8px;">
              <span>Total</span>
              <span style="color:var(--gold)">₹${o.total}</span>
            </div>
          </div>
        </div>

        <div style="margin-bottom:24px;">
          <div style="font-size:0.7rem; color:var(--text-muted); text-transform:uppercase; letter-spacing:1px; margin-bottom:8px;">Payment Details</div>
          <div style="background:var(--bg-surface); padding:12px; border-radius:var(--radius-sm); border:1px solid var(--border);">
            <div style="display:flex; justify-content:space-between;">
              <span style="color:var(--text-muted)">Method</span>
              <span style="font-weight:500">${o.paymentMethod || 'COD'}</span>
            </div>
            <div style="display:flex; justify-content:space-between; margin-top:4px;">
              <span style="color:var(--text-muted)">Status</span>
              <span style="font-weight:500; color:${o.paymentMethod === 'Online' ? 'var(--success)' : 'var(--warning)'}">${o.paymentMethod === 'Online' ? 'Paid' : 'Pending (COD)'}</span>
            </div>
            ${o.paymentId ? `
              <div style="display:flex; justify-content:space-between; margin-top:4px; font-size:0.8rem;">
                <span style="color:var(--text-muted)">Transaction ID</span>
                <span>${o.paymentId}</span>
              </div>
            ` : ''}
          </div>
        </div>

      </div>
      <div style="padding:16px 24px; border-top:1px solid var(--border); display:flex; justify-content:flex-end;">
        <button class="btn btn-outline" onclick="printInvoice()">Print Invoice</button>
      </div>
    </div>
  `;
  document.body.appendChild(modal);
}
window.viewOrderDetails = viewOrderDetails;

function printInvoice() {
  const printContent = document.getElementById('print-area').innerHTML;
  const originalContent = document.body.innerHTML;
  document.body.innerHTML = '<div style="padding:40px; color:black; background:white;">' + printContent.replace(/<button.*?>.*?<\/button>/g, '') + '</div>';
  window.print();
  document.body.innerHTML = originalContent;
  window.location.reload(); // Reload to restore SPA events safely
}
window.printInvoice = printInvoice;

</script>
